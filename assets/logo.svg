<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-label="BellTower Strategy Group">
  <!-- Tower mark -->
  <g transform="translate(8,8)">
    <!-- steeple tip -->
    <path d="M52 2 L56 16 H48 Z" fill="#1E4A7A"/>
    <!-- roof -->
    <path d="M28 36 L52 10 L76 36 Z" fill="#5BA8E0"/>
    <path d="M52 10 L76 36 H52 Z" fill="#2F6FA8"/>
    <path d="M28 36 L52 10 L76 36" fill="none" stroke="#1E4A7A" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- upper belfry -->
    <rect x="34" y="36" width="36" height="22" fill="#5BA8E0"/>
    <rect x="52" y="36" width="18" height="22" fill="#3B8BC4"/>
    <path d="M34 36 H70 V58 H34 Z" fill="none" stroke="#1E4A7A" stroke-width="1.25"/>
    <!-- arched openings -->
    <path d="M40 45 v11 h8 v-11 a4 4 0 0 0 -8 0 z" fill="#0B1C33"/>
    <path d="M56 45 v11 h8 v-11 a4 4 0 0 0 -8 0 z" fill="#0B1C33"/>
    <!-- main shaft -->
    <rect x="32" y="58" width="40" height="46" fill="#5BA8E0"/>
    <rect x="52" y="58" width="20" height="46" fill="#3B8BC4" opacity="0.55"/>
    <path d="M32 58 H72 V104 H32 Z" fill="none" stroke="#1E4A7A" stroke-width="1.25"/>
    <!-- lower windows -->
    <path d="M39 66 v12 h9 v-12 a4.5 4.5 0 0 0 -9 0 z" fill="#0B1C33"/>
    <path d="M56 66 v12 h9 v-12 a4.5 4.5 0 0 0 -9 0 z" fill="#0B1C33"/>
    <path d="M39 84 v12 h9 v-12 a4.5 4.5 0 0 0 -9 0 z" fill="#0B1C33"/>
    <path d="M56 84 v12 h9 v-12 a4.5 4.5 0 0 0 -9 0 z" fill="#0B1C33"/>
    <!-- base -->
    <rect x="24" y="104" width="56" height="8" fill="#1E4A7A"/>
    <rect x="28" y="101" width="48" height="3" fill="#2F6FA8"/>
  </g>

  <!-- Wordmark -->
  <text
    x="128"
    y="62"
    fill="#FFFFFF"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="600"
    letter-spacing="-0.5"
  >BellTower</text>

  <!-- STRATEGY GROUP with flanking rules -->
  <line x1="128" y1="88" x2="168" y2="88" stroke="#FFFFFF" stroke-width="1.25"/>
  <text
    x="292"
    y="93"
    fill="#FFFFFF"
    font-family="Helvetica, Arial, sans-serif"
    font-size="14"
    font-weight="600"
    letter-spacing="4.5"
    text-anchor="middle"
  >STRATEGY GROUP</text>
  <line x1="416" y1="88" x2="456" y2="88" stroke="#FFFFFF" stroke-width="1.25"/>
</svg>
