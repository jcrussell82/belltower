<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 130" role="img" aria-label="BellTower Strategy Group">
  <!-- Official-style lockup: tower mark + wordmark + flanking rules -->
  <g transform="translate(12, 10)">
    <!-- steeple -->
    <path d="M48 0 L52 14 H44 Z" fill="#1B4F80"/>
    <!-- roof -->
    <path d="M22 34 L48 8 L74 34 Z" fill="#4FA3D9"/>
    <path d="M48 8 L74 34 H48 Z" fill="#2E7BB8"/>
    <path d="M22 34 L48 8 L74 34 Z" fill="none" stroke="#9FD0F0" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- belfry with two arches -->
    <rect x="30" y="34" width="36" height="28" fill="#4FA3D9"/>
    <rect x="48" y="34" width="18" height="28" fill="#3B8FC8"/>
    <path d="M30 34 H66 V62 H30 Z" fill="none" stroke="#9FD0F0" stroke-width="1.1"/>
    <path d="M35 44 v16 h9 v-16 a4.5 4.5 0 0 0 -9 0 z" fill="#0A1A2E"/>
    <path d="M35 44 v16 h9 v-16 a4.5 4.5 0 0 0 -9 0 z" fill="none" stroke="#9FD0F0" stroke-width="0.8"/>
    <path d="M52 44 v16 h9 v-16 a4.5 4.5 0 0 0 -9 0 z" fill="#0A1A2E"/>
    <path d="M52 44 v16 h9 v-16 a4.5 4.5 0 0 0 -9 0 z" fill="none" stroke="#9FD0F0" stroke-width="0.8"/>
    <!-- mid tier -->
    <rect x="26" y="62" width="44" height="18" fill="#4FA3D9"/>
    <rect x="48" y="62" width="22" height="18" fill="#3B8FC8"/>
    <path d="M26 62 H70 V80 H26 Z" fill="none" stroke="#9FD0F0" stroke-width="1.1"/>
    <!-- lower shaft -->
    <rect x="28" y="80" width="40" height="22" fill="#4FA3D9"/>
    <rect x="48" y="80" width="20" height="22" fill="#3B8FC8"/>
    <path d="M28 80 H68 V102 H28 Z" fill="none" stroke="#9FD0F0" stroke-width="1.1"/>
    <!-- tiered base -->
    <rect x="22" y="102" width="52" height="8" fill="#2E7BB8"/>
    <rect x="16" y="110" width="64" height="8" fill="#1B4F80"/>
    <path d="M22 102 H74 V110 H22 Z" fill="none" stroke="#9FD0F0" stroke-width="0.9"/>
    <path d="M16 110 H80 V118 H16 Z" fill="none" stroke="#9FD0F0" stroke-width="0.9"/>
  </g>

  <text
    x="118"
    y="68"
    fill="#FFFFFF"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-size="56"
    font-weight="700"
    letter-spacing="-1"
  >BellTower</text>

  <line x1="118" y1="96" x2="168" y2="96" stroke="#FFFFFF" stroke-width="1.4"/>
  <text
    x="308"
    y="101"
    fill="#FFFFFF"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="14"
    font-weight="600"
    letter-spacing="5"
    text-anchor="middle"
  >STRATEGY GROUP</text>
  <line x1="448" y1="96" x2="498" y2="96" stroke="#FFFFFF" stroke-width="1.4"/>
</svg>
